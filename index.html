
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIELD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="field"></div>

<div id="app">

  <div id="home" class="screen active">
      <h1 class="title">FIELD</h1>
      <p class="subtitle">Choose your practice.</p>

      <div class="practice-buttons">
          <button onclick="openObserve()">Observe</button>
          <button onclick="openCollapse()">Collapse</button>
          <button onclick="openDecohere()">Decohere</button>
      </div>

      <div class="footer-link" onclick="openIntro()">revisit introduction</div>
  </div>

  <div id="observe" class="screen">
      <div class="topbar">
          <span class="back" onclick="goHome()">←</span>
          <span class="heading">OBSERVE</span>
      </div>

      <div class="observe-options">
          <button onclick="startObserve('drift')">drift</button>
          <button onclick="startObserve('kasina')">kasina</button>
          <button onclick="openNoting()">noting</button>
      </div>
  </div>

  <div id="noting" class="screen">
      <div class="topbar">
          <span class="back" onclick="openObserve()">←</span>
          <span class="heading">NOTING</span>
      </div>

      <div class="counter">notes · <span id="noteCount">0</span></div>

      <div class="sense-row">
          <button onclick="selectSense('seeing')">seeing</button>
          <button onclick="selectSense('hearing')">hearing</button>
          <button onclick="selectSense('body')">body</button>
          <button onclick="selectSense('mind')">mind</button>
          <button onclick="selectSense('taste')">taste</button>
          <button onclick="selectSense('smell')">smell</button>
      </div>

      <div class="tone-row">
          <button onclick="selectTone('pleasant')">+</button>
          <button onclick="selectTone('neutral')">○</button>
          <button onclick="selectTone('unpleasant')">−</button>
      </div>
  </div>

  <div id="collapse" class="screen">
      <div class="topbar">
          <span class="back" onclick="goHome()">←</span>
          <span class="heading">COLLAPSE</span>
      </div>

      <div class="states">
          <button onclick="collapseState('Calm')">Calm</button>
          <button onclick="collapseState('Brave')">Brave</button>
          <button onclick="collapseState('Clear')">Clear</button>
          <button onclick="collapseState('Open')">Open</button>
          <button onclick="collapseState('Grounded')">Grounded</button>
          <button onclick="collapseState('Present')">Present</button>
          <button onclick="collapseState('Luminous')">Luminous</button>
          <button onclick="collapseState('Expansive')">Expansive</button>
      </div>

      <div id="collapseRitual" class="ritual hidden">
          <div class="state-word" id="stateWord"></div>
          <div class="dots">● ● ●</div>
          <div class="breath-instruction">inhale · hold · exhale</div>
      </div>
  </div>

  <div id="decohere" class="screen">
      <div class="topbar">
          <span class="back" onclick="goHome()">←</span>
          <span class="heading">DECOHERE</span>
      </div>

      <div class="burdens">
          <button onclick="chooseBurden('Heavy')">Heavy</button>
          <button onclick="chooseBurden('Stuck')">Stuck</button>
          <button onclick="chooseBurden('Tight')">Tight</button>
      </div>

      <div id="bodyMap" class="hidden">
          <h2>Where do you feel it most?</h2>
          <div class="body-nodes">
              <button onclick="release()">head</button>
              <button onclick="release()">throat</button>
              <button onclick="release()">chest</button>
              <button onclick="release()">stomach</button>
              <button onclick="release()">pelvis</button>
          </div>
      </div>

      <div id="releaseResult" class="hidden">
          <h2>THE FIELD IS CLEAR.</h2>
          <p id="releaseText"></p>
      </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0805">
<title>Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --gold:#c9a96e; --gold-bright:#f0cc88; --gold-dim:rgba(201,169,110,.65);
  --cream:#f0e6d0; --cream-dim:rgba(240,230,208,.88); --cream-ghost:rgba(240,230,208,.58);
  --ascending:#ffe8b0; --bg:#0a0805;
  --fs:clamp(16px,4vw,20px); --fl:clamp(14px,3.5vw,17px);
  --fb:clamp(17px,4.2vw,21px); --fwm:clamp(28px,7vw,42px); --fh:clamp(22px,5.5vw,30px);
  --serif:'Cormorant Garamond',Georgia,serif;
}
b, strong { font-weight:400; }
html,body { margin:0;padding:0;width:100%;height:100%;background:var(--bg);
  font-family:'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  font-weight:300;color:var(--cream);overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  user-select:none;-webkit-user-select:none; }
*{box-sizing:border-box;} a{color:inherit;text-decoration:none;}

#cv{position:fixed;inset:0;z-index:1;pointer-events:none;}

.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.al{position:absolute;border-radius:50%;filter:blur(90px);opacity:0;transition:opacity 4s ease;}
.al.on{opacity:1;}
.a1{width:70vw;height:70vw;background:radial-gradient(circle,rgba(201,169,110,.10) 0%,transparent 70%);top:-15%;left:-15%;animation:d1 24s ease-in-out infinite;}
.a2{width:55vw;height:55vw;background:radial-gradient(circle,rgba(255,220,140,.07) 0%,transparent 70%);bottom:-10%;right:-10%;animation:d2 30s ease-in-out infinite;}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(8vw,5vw)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-7vw)}}

.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(24px,6vw,48px) clamp(20px,5vw,36px);
  pointer-events:none;}
.screen.active{display:flex;pointer-events:all;}

@media(min-width:600px){
  .screen.active{left:50%;transform:translateX(-50%);width:min(480px,100vw);right:auto;
    border-left:1px solid rgba(201,169,110,.04);border-right:1px solid rgba(201,169,110,.04);}
  #chrome{left:50%;transform:translateX(-50%);width:min(480px,100vw);}
  #settings-panel{left:50%;transform:translateX(-50%);width:min(480px,100vw);}
}

#chrome{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
  align-items:center;padding:18px 22px;z-index:300;}
.chrome-btn{font-family:inherit;font-size:var(--fl);letter-spacing:.10em;
  color:rgba(201,169,110,.72);background:none;border:none;cursor:pointer;
  padding:10px 14px;min-height:44px;min-width:44px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease,opacity .4s ease;font-weight:300;}
.chrome-btn:hover{color:var(--gold-bright);}
#backBtn{min-width:52px;text-align:left;}
#settingsBtn{text-align:right;font-size:clamp(16px,4vw,20px);}

#settings-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(10,8,5,.97);
  border-top:1px solid rgba(201,169,110,.12);
  border-radius:20px 20px 0 0;
  padding:28px 28px 48px;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(.32,.72,0,1);
  max-height:88vh;overflow-y:auto;
}
#settings-panel.open{transform:translateY(0);}
.settings-wordmark{font-size:clamp(11px,2.8vw,14px);letter-spacing:.22em;
  color:rgba(201,169,110,.62);text-align:center;margin-bottom:28px;text-transform:uppercase;}
.settings-section{margin-bottom:28px;}
.settings-label{font-size:clamp(11px,2.6vw,13px);letter-spacing:.16em;
  color:rgba(201,169,110,.62);text-transform:uppercase;margin-bottom:12px;}
.settings-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.api-input{flex:1;background:none;border:1px solid rgba(201,169,110,.18);
  border-radius:8px;padding:12px 14px;font-family:inherit;
  font-size:clamp(13px,3.2vw,15px);letter-spacing:.04em;
  color:rgba(240,230,208,.7);min-height:44px;min-width:0;
  -webkit-appearance:none;outline:none;transition:border-color .3s ease;}
.api-input:focus{border-color:rgba(201,169,110,.72);}
.api-input::placeholder{color:rgba(240,230,208,.78);}
.settings-btn{background:none;border:1px solid rgba(201,169,110,.18);
  border-radius:8px;padding:10px 16px;font-family:inherit;
  font-size:clamp(12px,3vw,14px);letter-spacing:.10em;
  color:rgba(201,169,110,.72);cursor:pointer;min-height:44px;
  -webkit-tap-highlight-color:transparent;transition:all .3s ease;white-space:nowrap;}
.settings-btn:hover{border-color:rgba(201,169,110,.5);color:var(--gold);}
.api-status{font-size:clamp(10px,2.5vw,12px);letter-spacing:.10em;
  color:rgba(201,169,110,.65);width:100%;margin-top:6px;}
.api-note{font-size:clamp(10px,2.4vw,11px);letter-spacing:.06em;
  color:rgba(240,230,208,.62);margin-top:4px;line-height:1.5;}
.toggle-row{display:flex;gap:10px;flex-wrap:wrap;}
.toggle-pill{background:none;border:1px solid rgba(201,169,110,.18);
  border-radius:999px;padding:10px 20px;font-family:inherit;
  font-size:clamp(12px,3vw,14px);letter-spacing:.10em;
  color:rgba(201,169,110,.68);cursor:pointer;min-height:42px;
  -webkit-tap-highlight-color:transparent;transition:all .3s ease;}
.toggle-pill.active{border-color:rgba(201,169,110,.65);color:rgba(240,204,136,.9);
  box-shadow:0 0 14px rgba(201,169,110,.12);}
.toggle-pill:hover{border-color:rgba(201,169,110,.65);}
.kofi-line{font-size:clamp(11px,2.6vw,13px);letter-spacing:.08em;
  color:rgba(201,169,110,.78);text-align:center;margin-top:4px;line-height:1.7;}
.kofi-line a{color:rgba(201,169,110,.65);transition:color .3s ease;}
.kofi-line a:hover{color:rgba(201,169,110,.65);}

#settings-backdrop{position:fixed;inset:0;z-index:490;background:rgba(0,0,0,0);
  pointer-events:none;transition:background .35s ease;}
#settings-backdrop.open{background:rgba(0,0,0,.4);pointer-events:all;}

.burst-el{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:0;height:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,232,176,.60) 0%,rgba(255,200,80,.22) 30%,transparent 70%);
  pointer-events:none;z-index:200;opacity:0;}
.burst-el.go{animation:bx 1s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes bx{0%{width:0;height:0;opacity:.85;margin:0}100%{width:200vmax;height:200vmax;margin:-100vmax;opacity:0}}

/* AE1: Reusable breathing glow */
@keyframes fieldTitleBreathe{
  0%,100%{text-shadow:0 0 20px rgba(201,169,110,.15),0 0 40px rgba(201,169,110,.06);}
  50%{text-shadow:0 0 30px rgba(240,204,136,.35),0 0 70px rgba(201,169,110,.18),0 0 120px rgba(201,169,110,.08);}}

@keyframes pulse{0%,100%{opacity:.38}50%{opacity:.80}}
@keyframes pulseCollapse{0%,100%{opacity:.38}50%{opacity:.80}}
@keyframes pulseObserve{0%,100%{opacity:.35}50%{opacity:.75}}

/* HOME */
#s-home{gap:0;justify-content:center;padding-top:80px;}
.field-title{font-size:clamp(52px,14vw,80px);font-weight:300;letter-spacing:.20em;
  color:var(--gold);line-height:1;margin-bottom:10px;
  animation:fieldTitleBreathe 6s ease-in-out infinite;}
.field-sub{font-size:var(--fs);color:rgba(240,230,208,.72);letter-spacing:.10em;margin-bottom:48px;}
.movements{display:flex;gap:0;align-items:flex-start;justify-content:space-evenly;margin-top:16px;width:100%;max-width:420px;}
.movement{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;padding:16px 8px;
  transition:transform .3s ease;flex:1;max-width:130px;}
.movement:active{transform:scale(.95);}
.mv-glyph{font-size:clamp(36px,10vw,52px);color:rgba(201,169,110,.82);
  transition:color .5s ease,text-shadow .5s ease;line-height:1;}
.movement:hover .mv-glyph,.movement.lit .mv-glyph{
  color:var(--gold-bright);text-shadow:0 0 20px rgba(240,204,136,.4);}
.mv-label{font-size:clamp(15px,4vw,19px);letter-spacing:.08em;color:rgba(201,169,110,.88);
  font-weight:300;transition:color .4s ease;text-align:center;white-space:nowrap;}
.movement:hover .mv-label,.movement.lit .mv-label{color:var(--gold);}
/* AE6: mv-hint opacity lifted for accessibility */
.mv-hint{font-size:clamp(11px,2.6vw,13px);letter-spacing:.05em;
  color:rgba(201,169,110,.82);text-align:center;max-width:90px;line-height:1.5;}
.obs-count-home{font-size:var(--fl);color:rgba(201,169,110,.75);letter-spacing:.08em;
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);white-space:nowrap;}

/* OBSERVE */
#s-observe{cursor:default;padding:0;}
#meter{display:flex;gap:6px;align-items:center;z-index:20;}
.mdot{width:4px;height:4px;border-radius:50%;background:rgba(201,169,110,.18);
  transition:background 1.5s ease,box-shadow 1.5s ease;}
.mdot.lit{background:var(--gold);box-shadow:0 0 6px rgba(201,169,110,.6);}
#clarity-ring{position:fixed;width:100px;height:100px;border-radius:50%;
  border:1px solid rgba(201,169,110,0);top:38%;left:50%;
  margin-left:-50px;margin-top:-50px;
  pointer-events:none;z-index:2;display:none;
  transition:border-color 2.5s ease,box-shadow 2.5s ease,width 2.5s ease,height 2.5s ease,margin 2.5s ease,top 1s ease;}
.sig-dot{width:8px;height:8px;border-radius:50%;background:rgba(201,169,110,.18);
  transition:background .6s ease,box-shadow .6s ease;}
.sig-label{font-size:clamp(9px,2.2vw,10px);letter-spacing:.12em;color:rgba(201,169,110,.75);
  text-align:center;font-weight:300;}

/* Observe coherence — AE1 breathing glow on word, AE7 slower pulse */
#s-obs-coherence{gap:40px;text-align:center;cursor:pointer;}
.obs-coh-word{font-size:clamp(14px,4vw,20px);font-weight:300;letter-spacing:.26em;color:rgba(201,169,110,.78);
  animation:fieldTitleBreathe 5s ease-in-out infinite;}
.obs-coh-line{font-size:var(--fb);color:var(--cream-dim);line-height:1.85;font-style:italic;max-width:280px;}
.obs-coh-tap{font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.65);
  animation:pulseObserve 3.8s ease-in-out infinite;}

/* COLLAPSE INTRO */
#s-init{justify-content:flex-end;gap:0;padding-bottom:clamp(80px,20vw,130px);}
.step{display:none;flex-direction:column;align-items:center;gap:clamp(20px,5vw,28px);width:100%;}
.step.on{display:flex;}
.s-main{font-size:var(--fh);font-weight:300;letter-spacing:.02em;color:var(--cream);
  text-align:center;line-height:1.55;max-width:340px;}
.s-main b{color:var(--gold-bright);font-weight:300;}
.s-sup{font-size:var(--fs);color:var(--cream-dim);text-align:center;line-height:1.72;max-width:300px;letter-spacing:.02em;}
.s-sup b{color:var(--gold);font-weight:300;}
.sci-note{font-size:clamp(10px,2.5vw,12px);color:rgba(201,169,110,.62);letter-spacing:.06em;max-width:280px;text-align:center;line-height:1.6;}
.sdots{display:flex;gap:7px;justify-content:center;margin-top:8px;}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(201,169,110,.18);transition:background .6s ease;}
.sdot.on{background:rgba(201,169,110,.65);}
/* AE7: collapse intro tap hint — 1.8s, fast/urgent */
#taph{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.68);
  animation:pulseCollapse 1.8s ease-in-out infinite;pointer-events:none;z-index:20;white-space:nowrap;}

/* COLLAPSE FIELD */
#s-field{gap:10px;padding-top:80px;}
.f-wordmark{font-size:var(--fwm);font-weight:300;letter-spacing:.16em;color:var(--gold);
  -webkit-tap-highlight-color:transparent;padding:6px 16px;display:inline-block;}
.f-line{font-size:var(--fs);color:var(--cream-dim);text-align:center;font-weight:300;letter-spacing:.02em;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,5vw,28px);
  width:100%;max-width:min(90vw,400px);padding:0 4px;}
.orb{display:flex;align-items:center;justify-content:center;
  padding:clamp(10px,3vw,16px) 4px;cursor:pointer;position:relative;
  background:none;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
  filter:blur(1.5px);opacity:0.7;
  animation:orbShimmer var(--drift-dur,4s) ease-in-out infinite,
            orbShudder calc(var(--drift-dur,4s) * 0.7) ease-in-out infinite;}
.oname{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;letter-spacing:.06em;
  font-size:clamp(22px,6vw,36px);color:rgba(240,210,140,.82);position:relative;z-index:1;
  text-align:center;line-height:1.1;word-break:break-word;overflow-wrap:break-word;
  text-shadow:0 0 18px rgba(240,190,80,.35),0 0 40px rgba(240,190,80,.15);
  transition:color .3s ease,text-shadow .3s ease;}
.orb:hover .oname,.orb:active .oname{color:rgba(255,228,160,.98);
  text-shadow:0 0 28px rgba(255,210,80,.6),0 0 60px rgba(255,200,60,.3);}
.orb.collapsing .oname{color:rgba(255,235,170,1)!important;filter:blur(0)!important;
  text-shadow:0 0 40px rgba(255,220,100,.8)!important;}
.orb.fading{opacity:0.06!important;pointer-events:none;transition:opacity .4s ease;}
@keyframes orbShimmer{
  0%,100%{filter:blur(1.5px);opacity:0.65;}
  50%{filter:blur(0.5px);opacity:0.88;}}
@keyframes orbShudder{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-0.5px,0.3px);}
  40%{transform:translate(0.4px,-0.4px);}
  60%{transform:translate(-0.3px,0.5px);}
  80%{transform:translate(0.5px,0.2px);}
}
.glyphs{display:flex;align-items:center;border-top:1px solid rgba(201,169,110,.08);
  padding-top:6px;width:100%;max-width:390px;justify-content:center;}
.glyph{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:clamp(18px,4.5vw,24px);color:rgba(201,169,110,.65);cursor:pointer;
  padding:8px 14px;min-width:50px;min-height:44px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease;display:block;}
.glyph:hover{color:var(--gold);}
.glyph-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(9px,2.2vw,11px);
  letter-spacing:.14em;color:rgba(201,169,110,.65);text-transform:uppercase;
  pointer-events:none;font-weight:300;}
.obs-ct{font-size:var(--fs);font-weight:300;letter-spacing:.04em;
  color:rgba(201,169,110,.60);text-align:center;min-height:22px;}
#revisitBtn{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.65);cursor:pointer;
  padding:10px 20px;min-height:40px;-webkit-tap-highlight-color:transparent;
  transition:color .4s ease;font-weight:300;}
#revisitBtn:hover{color:var(--gold);}
#revisitHomeBtn{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.65);cursor:pointer;
  padding:10px 20px;min-height:40px;-webkit-tap-highlight-color:transparent;
  transition:color .4s ease;font-weight:300;display:none;}
#revisitHomeBtn:hover{color:var(--gold);}
#guided-hint{position:fixed;bottom:clamp(24px,6vw,40px);left:50%;transform:translateX(-50%);
  font-size:clamp(12px,3vw,14px);letter-spacing:.16em;color:rgba(201,169,110,.68);
  pointer-events:all;cursor:pointer;white-space:nowrap;
  transition:opacity 1.2s ease;opacity:0;-webkit-tap-highlight-color:transparent;}

/* COLLAPSE STAGES */
#s-collapse{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cp-stage{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
  padding:clamp(24px,6vw,48px) clamp(24px,6vw,40px);text-align:center;
  opacity:0;pointer-events:none;transition:opacity .9s ease;visibility:hidden;z-index:1;}
.cp-stage.on{opacity:1;pointer-events:all;visibility:visible;z-index:2;}
.stage-inner{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;max-width:370px;}
.cword{font-size:clamp(78px,22vw,138px);font-weight:300;letter-spacing:.07em;
  font-family:var(--serif);color:var(--ascending);
  text-shadow:0 0 60px rgba(255,232,176,.72),0 0 110px rgba(255,200,80,.36),0 0 170px rgba(255,180,60,.18);
  line-height:1;width:100%;text-align:center;white-space:normal;word-break:break-word;
  transition:text-shadow 2s ease,transform 2s ease,color 2s ease,font-size 0.1s;}
.cword.exhaling{
  text-shadow:0 0 60px rgba(255,240,180,1),0 0 120px rgba(255,210,80,.7),0 0 200px rgba(255,180,40,.4);
  transform:scale(1.06);color:rgba(255,240,180,1);}
.c-confirm-label{font-size:clamp(11px,3.2vw,15px);letter-spacing:.18em;color:var(--cream-ghost);display:block;font-weight:300;margin-bottom:16px;text-transform:lowercase;}
.c-confirm-sub{font-size:clamp(11px,3.2vw,14px);color:var(--cream-ghost);font-weight:300;letter-spacing:.12em;margin-top:16px;display:block;opacity:0.7;}
.c-eq-note{display:none;}
.imag-prompt{font-size:var(--fb);color:var(--cream-dim);line-height:1.82;font-style:italic;max-width:330px;font-weight:300;}
.bwrap{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;}
.btext-slot{height:clamp(64px,16vw,88px);display:flex;align-items:center;justify-content:center;width:100%;position:relative;overflow:hidden;}
.btext{font-size:var(--fh);font-weight:300;letter-spacing:.14em;color:var(--cream-dim);
  position:absolute;left:50%;transform:translateX(-50%);
  width:90vw;max-width:340px;
  transition:opacity .5s ease;text-align:center;white-space:normal;line-height:1.4;}
/* intro instructions — large and prominent */
.btext.intro{font-size:clamp(18px,4.8vw,26px);letter-spacing:.08em;color:rgba(240,230,208,.82);line-height:1.6;}
.btext.intro-gold{font-size:clamp(22px,6vw,34px);letter-spacing:.06em;color:var(--gold-bright);
  text-shadow:0 0 40px rgba(240,204,136,.78);font-family:var(--serif);}
/* cycle labels — minimal, ghostly */
.btext.cycle{font-size:clamp(13px,3.2vw,16px);letter-spacing:.22em;color:rgba(201,169,110,.78);text-transform:lowercase;}
.btext.cycle-exhale{font-size:clamp(13px,3.2vw,16px);letter-spacing:.22em;color:rgba(240,204,136,.82);text-transform:lowercase;}
.bp-wrap{position:relative;width:1px;height:1px;}
.bp{position:fixed;width:18px;height:18px;border-radius:50%;background:var(--gold-bright);
  transform:translate(-50%,-50%);pointer-events:none;z-index:30;
  box-shadow:0 0 24px var(--gold),0 0 60px rgba(201,169,110,.65),0 0 100px rgba(201,169,110,.15);}
.bp.neutral{transition:left 1.8s cubic-bezier(.25,.46,.45,.94),top 1.8s cubic-bezier(.25,.46,.45,.94),
  transform 1.5s cubic-bezier(.25,.46,.45,.94),filter 1.5s ease,box-shadow 1.5s ease,opacity 1.4s ease;}
.bp.settling{
  transition:left 1.8s cubic-bezier(.25,.46,.45,.94),top 1.8s cubic-bezier(.25,.46,.45,.94),
    transform 1.8s cubic-bezier(.25,.46,.45,.94),filter 1.8s ease,box-shadow 1.8s ease;
  transform:translate(-50%,-50%) scale(2.6);filter:blur(2px);
  box-shadow:0 0 30px rgba(201,169,110,.6),0 0 80px rgba(201,169,110,.3),0 0 140px rgba(201,169,110,.12);}
.bp.inhaling{
  transition:left 1.2s ease,top 1.2s ease,
    transform 4.5s cubic-bezier(.25,.46,.45,.94),filter 4.5s ease,box-shadow 4.5s ease;
  transform:translate(-50%,-50%) scale(11);filter:blur(12px);
  box-shadow:0 0 20px rgba(201,169,110,.65),0 0 80px rgba(201,169,110,.58),0 0 200px rgba(201,169,110,.12);}
.bp.holding{
  transition:transform 1.5s ease,filter 1.5s ease,box-shadow 1.5s ease;
  transform:translate(-50%,-50%) scale(11);filter:blur(10px);
  box-shadow:0 0 30px rgba(220,185,120,.45),0 0 100px rgba(201,169,110,.60),0 0 220px rgba(201,169,110,.14);}
.bp.exhaling{
  transition:transform 5s cubic-bezier(.16,1,.3,1),filter 5s cubic-bezier(.16,1,.3,1),box-shadow 5s ease;
  transform:translate(-50%,-50%) scale(1);filter:blur(0);
  box-shadow:0 0 50px rgba(255,220,130,1),0 0 130px rgba(240,204,136,.85),0 0 260px rgba(255,232,176,.45),0 0 420px rgba(201,169,110,.2);}
.bp.crystallised{
  transition:transform 1.4s ease,filter 1.4s ease,box-shadow 1.4s ease;
  transform:translate(-50%,-50%) scale(1.6);filter:blur(0);
  box-shadow:0 0 50px rgba(240,190,60,1),0 0 120px rgba(220,160,30,.8),0 0 220px rgba(200,130,20,.45);
  animation:crystallPulse 2.8s ease-in-out infinite;}
@keyframes crystallPulse{
  0%,100%{box-shadow:0 0 50px rgba(240,190,60,1),0 0 120px rgba(220,160,30,.8),0 0 220px rgba(200,130,20,.45);}
  50%{box-shadow:0 0 70px rgba(255,210,40,1),0 0 160px rgba(240,180,30,.95),0 0 300px rgba(220,150,20,.6);}}
.bripple{position:fixed;width:18px;height:18px;border-radius:50%;
  transform:translate(-50%,-50%);z-index:29;
  border:1px solid rgba(201,169,110,.5);pointer-events:none;opacity:0;}
.bripple.expand{animation:ripOut 5s cubic-bezier(.25,.46,.45,.94) forwards;}
.bripple.expand-soft{animation:ripOutSoft 3s cubic-bezier(.25,.46,.45,.94) forwards;}
@keyframes ripOut{0%{opacity:.6;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(18)}}
@keyframes ripOutSoft{0%{opacity:.3;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(8)}}
.bdots{display:flex;gap:14px;position:fixed;bottom:clamp(60px,14vw,90px);left:50%;transform:translateX(-50%);z-index:20;}
.bdot{width:7px;height:7px;border-radius:50%;background:rgba(201,169,110,.15);

.bdot.done{background:var(--gold);box-shadow:0 0 8px rgba(201,169,110,.5);}
.obs-note{font-size:var(--fb);color:var(--cream-dim);line-height:1.72;max-width:330px;font-weight:300;}
.closing{font-size:var(--fs);color:rgba(201,169,110,.72);width:100%;max-width:340px;font-weight:300;line-height:1.65;text-align:center;opacity:0;}
.return-btn{background:none;border:none;color:rgba(201,169,110,.68);

/* AE7: tapNext default pulse 2.8s */

.tone-chip[data-tone-key="unpleasant"].active .tone-chip-symbol{color:rgba(140,180,240,.95);}

}

/* Body map */
.bodymap-wrap{position:relative;width:100%;max-width:320px;height:min(56vh,400px);margin-top:6px;display:flex;align-items:flex-start;}
.bodymap-figure{position:absolute;left:50%;top:0;transform:translateX(-50%);width:180px;height:100%;pointer-events:none;}
.bodymap-figure canvas{width:100%;height:100%;}
/* UX3: body-node safe left — JS sets max(8px, 22%) */
.body-node{position:absolute;left:22%;transform:translateX(-50%);
  background:none;border:1px solid rgba(201,169,110,.18);border-radius:999px;
  color:rgba(240,230,208,.72);padding:9px 14px;min-height:40px;font-family:inherit;
  letter-spacing:.08em;-webkit-tap-highlight-color:transparent;transition:all .3s ease;cursor:pointer;
  font-size:clamp(12px,3vw,14px);}
.body-node.active,.body-node:hover{border-color:rgba(201,169,110,.7);color:rgba(240,204,136,.92);}

/* Mic pulse animation */
@keyframes micPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,.0);}
  50%{box-shadow:0 0 0 8px rgba(201,169,110,.18),0 0 20px rgba(201,169,110,.78);}
}

/* Body map screen */
#s-bodymap{gap:12px;padding-top:72px;}
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div class="aurora">
  <div class="al a1"></div>
  <div class="al a2"></div>
</div>
<div id="ghosts"></div>
<div class="burst-el" id="burst"></div>

<div id="settings-backdrop" onclick="closeSettings()"></div>

<div id="settings-panel">
  <div class="settings-wordmark">Field · Settings</div>
  <div class="settings-section">
    <div class="settings-label">Anthropic API Key</div>
    <div class="settings-row">
      <input class="api-input" id="st-api-input" type="password" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="settings-btn" onclick="saveApiKey()">save</button>
      <button class="settings-btn" onclick="clearApiKey()">clear</button>
    </div>
    <div class="api-status" id="st-api-status">no key</div>
    <div class="api-note">stored locally · never transmitted · used for AI features</div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Audio</div>
    <div class="toggle-row">
      <button class="toggle-pill active" id="st-audio" onclick="settingsToggleAudio()">sound on</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Text Size</div>
    <div class="toggle-row">
      <button class="toggle-pill" id="st-font" onclick="settingsToggleFont()">larger text</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Language</div>
    <div class="toggle-row">
      <button class="toggle-pill" id="st-lang" onclick="settingsToggleLang()">EN</button>
    </div>
  </div>
  <div class="kofi-line">
    if this has been useful ·
    <a href="https://ko-fi.com/nikolai" target="_blank" rel="noopener">ko-fi.com/nikolai</a>
  </div>
</div>

<div id="chrome">
  <button class="chrome-btn" id="backBtn" onclick="goHome()" style="opacity:0;pointer-events:none;">←</button>
  <button class="chrome-btn" id="langToggleBtn" onclick="toggleLang()" style="font-size:clamp(10px,2.5vw,13px);letter-spacing:.18em;opacity:0.38;padding:8px 4px;"></button>
  <button class="chrome-btn" id="settingsBtn" onclick="toggleSettings()">⚙</button>
</div>

<div class="screen" id="s-landing">
  <canvas id="landing-cv" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  <div class="landing-tap-hint" id="landingHint">tap</div>
</div>

<div class="screen" id="s-welcome">
  <div class="wlc-card on" id="wlc0">
    <div class="wlc-big" id="wlc0-big"></div>
    <div class="wlc-small" id="wlc0-small"></div>
  </div>
  <div class="wlc-card" id="wlc1">
    <div class="wlc-big" id="wlc1-big"></div>
    <div class="wlc-small" id="wlc1-small"></div>
  </div>
  <div class="wlc-card" id="wlc2">
    <div class="wlc-big" id="wlc2-big"></div>
    <div class="wlc-movements">
      <div class="wlc-mv"><div class="wlc-mv-glyph">◎</div><div class="wlc-mv-label" id="wlc-ml0"></div><div class="wlc-mv-hint" id="wlc-mh0"></div></div>
      <div class="wlc-mv"><div class="wlc-mv-glyph">↑</div><div class="wlc-mv-label" id="wlc-ml1"></div><div class="wlc-mv-hint" id="wlc-mh1"></div></div>
      <div class="wlc-mv"><div class="wlc-mv-glyph">◯</div><div class="wlc-mv-label" id="wlc-ml2"></div><div class="wlc-mv-hint" id="wlc-mh2"></div></div>
    </div>
    <button class="wlc-enter" id="wlcEnterBtn"></button>
  </div>
  <div class="wlc-dots">
    <div class="wlc-dot on" id="wdot0"></div>
    <div class="wlc-dot" id="wdot1"></div>
    <div class="wlc-dot" id="wdot2"></div>
  </div>
  <div class="wlc-tap-hint" id="wlcTapHint"></div>
</div>

<div class="screen active" id="s-home">
  <div class="field-title">Field</div>
  <div class="field-sub" id="homeFieldSub"></div>
  <div class="movements">
    <div class="movement" id="mv-observe" onclick="startObserve()">
      <div class="mv-glyph">◎</div>
      <div class="mv-label" id="mvObserveLabel"></div>
      <div class="mv-hint" id="mvObserveHint"></div>
    </div>
    <div class="movement" id="mv-collapse" onclick="startCollapse()">
      <div class="mv-glyph">↑</div>
      <div class="mv-label" id="mvCollapseLabel"></div>
      <div class="mv-hint" id="mvCollapseHint"></div>
    </div>
    <div class="movement" id="mv-witness" onclick="startDecohere()">
      <div class="mv-glyph">◯</div>
      <div class="mv-label" id="mvWitnessLabel"></div>
      <div class="mv-hint" id="mvWitnessHint"></div>
    </div>
  </div>
  <div class="obs-count-home" id="homeCount"></div>
  <button id="revisitHomeBtn" onclick="revisitIntro()">revisit introduction</button>
  <div id="guided-hint" onclick="revisitIntro()"></div>
</div>

<div class="screen" id="s-observe"></div>

<div class="screen" id="s-obs-coherence" onclick="goHome()">
  <div class="obs-coh-word" id="obsCohWord"></div>
  <div class="obs-coh-line" id="obsCohLine"></div>
  <div class="obs-coh-tap" id="obsCohTap"></div>
</div>

<div class="screen" id="s-init" onclick="advanceStep()"></div>

<div class="screen" id="s-field">
  <div class="f-wordmark">Field</div>
  <div class="f-line" id="fline"></div>
  <div class="grid" id="grid"></div>
  <div class="glyphs">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <button class="glyph" onclick="goStill()">—</button>
      <span class="glyph-label">STILL</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <button class="glyph" onclick="goHome()">◎</button>
      <span class="glyph-label">FIELD</span>
    </div>
  </div>
  <div class="obs-ct" id="obsCt"></div>
  <button id="revisitBtn" onclick="revisitIntro()"></button>
</div>

<div class="screen" id="s-collapse">
  <div id="tapNext" style="opacity:0;"></div>
  <div class="cp-stage" id="cs1">
    <div class="stage-inner">
      <span class="c-confirm-label" id="cLabel1"></span>
      <div class="cword" id="cword"></div>
      <span class="c-confirm-sub" id="cSub1"></span>
    </div>
  </div>
  <div class="cp-stage" id="cs2">
    <div class="stage-inner">
      <div class="cword" id="cword5" style="font-size:clamp(52px,15vw,100px);"></div>
      <div class="c-eq-note" id="ceqNote"></div>
    </div>
  </div>
  <div class="cp-stage" id="cs4">
    <div class="bwrap">
      <div class="btext-slot">
        <div class="btext" id="btext"></div>
      </div>
      <div class="bp-wrap" id="bp-wrap">
        <!-- bp and bripple are position:fixed, placed by JS -->
      </div>
      <div class="bdots">
        <div class="bdot" id="bdot0"></div>
        <div class="bdot" id="bdot1"></div>
        <div class="bdot" id="bdot2"></div>
      </div>
    </div>
  </div>
  <div class="cp-stage" id="cs6">
    <div class="stage-inner">
      <span class="c-confirm-label" id="imagLabel3"></span>
      <div class="imag-prompt" id="imagPrompt"></div>
      <div class="obs-note" id="obsNote"></div>
      <div class="closing" id="closing"></div>
    </div>
    <div class="bdots" style="margin-top:28px;">
      <div class="bdot done" id="bdot0x"></div>
      <div class="bdot done" id="bdot1x"></div>
      <div class="bdot done" id="bdot2x"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:32px;">
      <span class="c-confirm-label" id="qlabel6"></span>
      <div class="obs-note" id="obsNote5" style="font-size:var(--fh);font-style:italic;"></div>
    </div>
    <button class="return-btn" id="retBtn"></button>
  </div>
</div>

<div class="screen" id="s-still">
  <div class="still-p"></div>
  <div class="still-line" id="stillTxt"></div>
  <button class="still-back" id="stillBack"></button>
</div>

<div class="screen" id="s-storm">
  <div id="storm-words-layer"></div>
  <div id="storm-note-log"></div>
</div>

<div class="screen" id="s-bodymap" style="display:flex;flex-direction:column;align-items:center;"></div>
<div class="screen" id="s-witness">
  <div class="dec-line" id="decArrivalLine"></div>
  <div class="dec-sub" id="decArrivalSub"></div>
  <div class="shadow-grid" id="shadowGrid"></div>
</div>

<div class="screen" id="s-dec-breath">
  <div id="dec-ack-layer">
    <div id="dec-word"></div>
  </div>
  <div id="dec-breath-layer">
    <div id="dec-btext"></div>
    <div id="dec-bp-wrap">
      <div id="dec-bp"></div>
      <div id="dec-word-orb"></div>
      <div class="dec-ripple" id="dec-rip0"></div>
      <div class="dec-ripple" id="dec-rip1"></div>
      <div class="dec-ripple" id="dec-rip2"></div>
    </div>
  </div>
  <div id="dec-bdots">
    <div class="bdot" id="dec-dot0"></div>
    <div class="bdot" id="dec-dot1"></div>
    <div class="bdot" id="dec-dot2"></div>
  </div>
</div>

<div class="screen" id="s-dec-end">
  <div class="dec-witnessed" id="decWitnessed"></div>
  <div class="dec-end-line" id="decEndLine"></div>
  <div class="dec-btns">
    <button class="dec-btn" id="decRetBtn" onclick="goHome()"></button>
    <button class="dec-btn" id="decAgainBtn" onclick="startDecohere()"></button>
  </div>
</div>

<div class="screen" id="s-chamber">
  <div id="chamber-inner">
    <div id="chamber-context"></div>
    <div id="chamber-messages"></div>
    <div id="chamber-input-wrap">
      <textarea id="chamber-input" placeholder="" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chamberSend();}"></textarea>
      <button id="chamber-send" onclick="chamberSend()">↵</button>
    </div>
    <div id="chamber-skip">continue to breath →</div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>

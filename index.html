<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0805">
<title>Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --gold:#c9a96e; --gold-bright:#f0cc88; --gold-dim:rgba(201,169,110,.35);
  --cream:#f0e6d0; --cream-dim:rgba(240,230,208,.72); --cream-ghost:rgba(240,230,208,.38);
  --ascending:#ffe8b0; --bg:#0a0805;
  --fs:clamp(16px,4vw,20px); --fl:clamp(14px,3.5vw,17px);
  --fb:clamp(17px,4.2vw,21px); --fwm:clamp(28px,7vw,42px); --fh:clamp(22px,5.5vw,30px);
  --serif:'Cormorant Garamond',Georgia,serif;
}
/* Fix bold weight globally — 400 not 700 */
b, strong { font-weight:400; }
html,body { margin:0;padding:0;width:100%;height:100%;background:var(--bg);
  font-family:'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  font-weight:300;color:var(--cream);overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  user-select:none;-webkit-user-select:none; }
*{box-sizing:border-box;} a{color:inherit;text-decoration:none;}

/* CANVAS */
#cv{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* AURORA */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.al{position:absolute;border-radius:50%;filter:blur(90px);opacity:0;transition:opacity 4s ease;}
.al.on{opacity:1;}
.a1{width:70vw;height:70vw;background:radial-gradient(circle,rgba(201,169,110,.10) 0%,transparent 70%);top:-15%;left:-15%;animation:d1 24s ease-in-out infinite;}
.a2{width:55vw;height:55vw;background:radial-gradient(circle,rgba(255,220,140,.07) 0%,transparent 70%);bottom:-10%;right:-10%;animation:d2 30s ease-in-out infinite;}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(8vw,5vw)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-7vw)}}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(24px,6vw,48px) clamp(20px,5vw,36px);
  pointer-events:none;}
.screen.active{display:flex;pointer-events:all;}
.screen.fading{opacity:0;}
.screen.visible{opacity:1;}

/* DESKTOP PANEL */
@media(min-width:600px){
  .screen.active{left:50%;transform:translateX(-50%);width:min(480px,100vw);right:auto;
    border-left:1px solid rgba(201,169,110,.04);border-right:1px solid rgba(201,169,110,.04);}
  #chrome{left:50%;transform:translateX(-50%);width:min(480px,100vw);}
}

/* CHROME */
#chrome{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
  align-items:center;padding:18px 22px;z-index:300;}
.chrome-btn{font-family:inherit;font-size:var(--fl);letter-spacing:.10em;
  color:rgba(201,169,110,.45);background:none;border:none;cursor:pointer;
  padding:10px 14px;min-height:44px;min-width:44px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease,opacity .4s ease;font-weight:300;}
.chrome-btn:hover{color:var(--gold-bright);}
#backBtn{min-width:52px;text-align:right;}

/* BURST */
.burst-el{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:0;height:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,232,176,.60) 0%,rgba(255,200,80,.22) 30%,transparent 70%);
  pointer-events:none;z-index:200;opacity:0;}
.burst-el.go{animation:bx 1s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes bx{0%{width:0;height:0;opacity:.85;margin:0}100%{width:200vmax;height:200vmax;margin:-100vmax;opacity:0}}

/* ═══ FIELD HOME SCREEN ═══ */
#s-home{gap:0;justify-content:center;padding-top:80px;}
.field-title{font-size:clamp(52px,14vw,80px);font-weight:300;letter-spacing:.20em;
  color:var(--gold);line-height:1;margin-bottom:10px;
  animation:fieldTitleBreathe 6s ease-in-out infinite;}
@keyframes fieldTitleBreathe{
  0%,100%{text-shadow:0 0 20px rgba(201,169,110,.15),0 0 40px rgba(201,169,110,.06);}
  50%{text-shadow:0 0 30px rgba(240,204,136,.35),0 0 70px rgba(201,169,110,.18),0 0 120px rgba(201,169,110,.08);}}
.field-sub{font-size:var(--fs);color:var(--cream-ghost);letter-spacing:.08em;margin-bottom:48px;}

/* Three movement glyphs */
.movements{display:flex;gap:0;align-items:flex-start;justify-content:center;margin-top:16px;width:100%;max-width:420px;justify-content:space-evenly;}
.movement{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;padding:16px 8px;
  transition:transform .3s ease;flex:1;max-width:130px;}
.movement:active{transform:scale(.95);}
.mv-glyph{font-size:clamp(36px,10vw,52px);color:rgba(201,169,110,.45);
  transition:color .5s ease,text-shadow .5s ease;line-height:1;}
.movement:hover .mv-glyph,.movement.lit .mv-glyph{
  color:var(--gold-bright);
  text-shadow:0 0 20px rgba(240,204,136,.4);}
.mv-label{font-size:clamp(15px,4vw,19px);letter-spacing:.08em;color:rgba(201,169,110,.70);
  font-weight:300;transition:color .4s ease;text-align:center;white-space:nowrap;}
.movement:hover .mv-label,.movement.lit .mv-label{color:var(--gold);}
.mv-hint{font-size:clamp(12px,2.8vw,14px);letter-spacing:.05em;
  color:rgba(201,169,110,.30);text-align:center;max-width:90px;line-height:1.5;}

.obs-count-home{font-size:var(--fl);color:rgba(201,169,110,.25);letter-spacing:.08em;
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);white-space:nowrap;}

/* ═══ OBSERVE SCREEN ═══ */
#s-observe{cursor:default;padding:0;}

/* Meter */
#meter{display:flex;gap:6px;align-items:center;z-index:20;}
.mdot{width:4px;height:4px;border-radius:50%;background:rgba(201,169,110,.18);
  transition:background 1.5s ease,box-shadow 1.5s ease;}
.mdot.lit{background:var(--gold);box-shadow:0 0 6px rgba(201,169,110,.6);}

/* Clarity ring */
#clarity-ring{position:fixed;width:100px;height:100px;border-radius:50%;
  border:1px solid rgba(201,169,110,0);top:38%;left:50%;
  margin-left:-50px;margin-top:-50px;
  pointer-events:none;z-index:2;display:none;
  transition:border-color 2.5s ease,box-shadow 2.5s ease,width 2.5s ease,height 2.5s ease,margin 2.5s ease,top 1s ease;}

/* Signal dots */
.sig-dot{width:8px;height:8px;border-radius:50%;background:rgba(201,169,110,.18);
  transition:background .6s ease,box-shadow .6s ease;}
.sig-label{font-size:clamp(9px,2.2vw,10px);letter-spacing:.12em;color:rgba(201,169,110,.28);
  text-align:center;font-weight:300;}

/* Affirmation button pulse */
@keyframes affirmPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}

/* Clarity ring — positioned globally */
#clarity-ring{position:fixed;width:100px;height:100px;border-radius:50%;
  border:1px solid rgba(201,169,110,0);top:38%;left:50%;
  margin-left:-50px;margin-top:-50px;
  pointer-events:none;z-index:2;
  transition:border-color 2s ease,box-shadow 2s ease,width 2s ease,height 2s ease,margin 2s ease,top 1s ease;}

/* Observe coherence */
#s-obs-coherence{gap:40px;text-align:center;cursor:pointer;}
.obs-coh-word{font-size:clamp(14px,4vw,20px);font-weight:300;letter-spacing:.26em;
  color:rgba(201,169,110,.55);}
.obs-coh-line{font-size:var(--fb);color:var(--cream-dim);line-height:1.85;
  font-style:italic;max-width:280px;}
.obs-coh-tap{font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.35);
  animation:pulse 2.8s ease-in-out infinite;}

/* ═══ COLLAPSE INTRO SCREENS ═══ */
#s-init{justify-content:flex-end;gap:0;padding-bottom:clamp(80px,20vw,130px);}
.step{display:none;flex-direction:column;align-items:center;gap:clamp(20px,5vw,28px);width:100%;}
.step.on{display:flex;}
.s-main{font-size:var(--fh);font-weight:300;letter-spacing:.02em;color:var(--cream);
  text-align:center;line-height:1.55;max-width:340px;}
.s-main b{color:var(--gold-bright);font-weight:300;}
.s-sup{font-size:var(--fs);color:var(--cream-dim);text-align:center;line-height:1.72;
  max-width:300px;letter-spacing:.02em;}
.s-sup b{color:var(--gold);font-weight:300;}
.sci-note{font-size:clamp(10px,2.5vw,12px);color:rgba(201,169,110,.30);
  letter-spacing:.06em;max-width:280px;text-align:center;line-height:1.6;}
.sci-note span{color:rgba(201,169,110,.55);}
.sdots{display:flex;gap:7px;justify-content:center;margin-top:8px;}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(201,169,110,.18);
  transition:background .6s ease;}
.sdot.on{background:rgba(201,169,110,.65);}
#taph{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.38);
  animation:pulse 2.8s ease-in-out infinite;pointer-events:none;z-index:20;white-space:nowrap;}
@keyframes pulse{0%,100%{opacity:.38}50%{opacity:.80}}

/* ═══ COLLAPSE FIELD ═══ */
#s-field{gap:10px;padding-top:80px;}
.f-wordmark{font-size:var(--fwm);font-weight:300;letter-spacing:.16em;color:var(--gold);
  -webkit-tap-highlight-color:transparent;padding:6px 16px;display:inline-block;}
.f-line{font-size:var(--fs);color:var(--cream-dim);text-align:center;font-weight:300;letter-spacing:.02em;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,5vw,28px);
  width:100%;max-width:min(90vw,400px);padding:0 4px;}
.orb{display:flex;align-items:center;justify-content:center;
  padding:clamp(10px,3vw,16px) 4px;
  cursor:pointer;position:relative;background:none;border:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
  filter:blur(1.5px);opacity:0.7;
  animation:orbShimmer var(--drift-dur,4s) ease-in-out infinite,
            orbShudder calc(var(--drift-dur,4s) * 0.7) ease-in-out infinite;}
.oname{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;letter-spacing:.06em;
  font-size:clamp(22px,6vw,36px);
  color:rgba(240,210,140,.82);position:relative;z-index:1;
  text-align:center;line-height:1.1;
  word-break:break-word;overflow-wrap:break-word;
  text-shadow:0 0 18px rgba(240,190,80,.35),0 0 40px rgba(240,190,80,.15);
  transition:color .3s ease,text-shadow .3s ease;}
.orb:hover .oname,.orb:active .oname{
  color:rgba(255,228,160,.98);
  text-shadow:0 0 28px rgba(255,210,80,.6),0 0 60px rgba(255,200,60,.3);}
.orb.collapsing .oname{color:rgba(255,235,170,1)!important;filter:blur(0)!important;
  text-shadow:0 0 40px rgba(255,220,100,.8)!important;}
.orb.fading{opacity:0.06!important;pointer-events:none;
  transition:opacity .4s ease;}
@keyframes orbShimmer{
  0%,100%{filter:blur(1.5px);opacity:0.65;text-shadow:0 0 18px rgba(240,190,80,.25);}
  50%{filter:blur(0.5px);opacity:0.88;text-shadow:0 0 32px rgba(255,210,80,.55);}}
@keyframes orbShudder{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-0.5px,0.3px);}
  40%{transform:translate(0.4px,-0.4px);}
  60%{transform:translate(-0.3px,0.5px);}
  80%{transform:translate(0.5px,0.2px);}
}
.glyphs{display:flex;gap:0;align-items:center;border-top:1px solid rgba(201,169,110,.08);
  padding-top:6px;width:100%;max-width:390px;justify-content:center;}
.glyph{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:clamp(18px,4.5vw,24px);color:rgba(201,169,110,.35);cursor:pointer;
  padding:8px 14px;min-width:50px;min-height:44px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease;display:block;}
.glyph:hover{color:var(--gold);}
.glyph-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(9px,2.2vw,11px);
  letter-spacing:.14em;color:rgba(201,169,110,.20);text-transform:uppercase;
  pointer-events:none;font-weight:300;}
.obs-ct{font-size:var(--fs);font-weight:300;letter-spacing:.04em;
  color:rgba(201,169,110,.28);text-align:center;min-height:22px;}
#revisitBtn{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.35);cursor:pointer;
  padding:10px 20px;min-height:40px;-webkit-tap-highlight-color:transparent;
  transition:color .4s ease;font-weight:300;}
#revisitBtn:hover{color:var(--gold);}

/* ═══ COLLAPSE STAGES ═══ */
#s-collapse{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cp-stage{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
  padding:clamp(24px,6vw,48px) clamp(24px,6vw,40px);text-align:center;
  opacity:0;pointer-events:none;transition:opacity .9s ease;visibility:hidden;z-index:1;}
.cp-stage.on{opacity:1;pointer-events:all;visibility:visible;z-index:2;}
.stage-inner{display:flex;flex-direction:column;align-items:center;gap:22px;
  width:100%;max-width:370px;}
.cword{font-size:clamp(64px,20vw,120px);font-weight:300;letter-spacing:.06em;
  font-family:var(--serif);
  color:var(--ascending);
  text-shadow:0 0 40px rgba(255,232,176,.60),0 0 80px rgba(255,200,80,.28);
  line-height:1;width:100%;text-align:center;
  white-space:normal;word-break:break-word;
  transition:text-shadow 2s ease,transform 2s ease,color 2s ease,font-size 0.1s;}
.cword.exhaling{
  text-shadow:0 0 60px rgba(255,240,180,1),0 0 120px rgba(255,210,80,.7),0 0 200px rgba(255,180,40,.4);
  transform:scale(1.06);color:rgba(255,240,180,1);}
.c-confirm-label{font-size:var(--fl);letter-spacing:.14em;color:var(--gold);display:block;
  font-weight:300;margin-bottom:4px;}
.c-confirm-sub{font-size:var(--fs);color:var(--cream-ghost);font-weight:300;}
.c-eq-note{font-size:var(--fs);color:var(--cream-ghost);font-weight:300;}
.imag-prompt{font-size:var(--fb);color:var(--cream-dim);line-height:1.82;font-style:italic;
  max-width:330px;font-weight:300;}

/* Breath */
.bwrap{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;}
.btext-slot{height:clamp(64px,16vw,88px);display:flex;align-items:center;
  justify-content:center;width:100%;position:relative;overflow:hidden;}
.btext{font-size:var(--fh);font-weight:300;letter-spacing:.14em;color:var(--cream-dim);
  position:absolute;left:50%;transform:translateX(-50%);
  width:90vw;max-width:340px;
  transition:opacity .5s ease;text-align:center;white-space:normal;line-height:1.4;}
.btext.gold{color:var(--gold-bright);font-size:clamp(26px,7vw,44px);
  text-shadow:0 0 30px rgba(240,204,136,.5);}
.btext.dim{font-size:var(--fs);letter-spacing:.06em;}
.bp-wrap{position:relative;width:120px;height:120px;display:flex;
  align-items:center;justify-content:center;}
.bp{width:22px;height:22px;border-radius:50%;background:var(--gold-bright);
  box-shadow:0 0 18px var(--gold),0 0 50px rgba(201,169,110,.28);}
.bp.neutral{transition:transform .8s ease,filter .8s ease,box-shadow .8s ease;}
.bp.inhaling{transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s ease,box-shadow 4s ease;
  transform:scale(3.2);filter:blur(4px);
  box-shadow:0 0 8px rgba(201,169,110,.15),0 0 40px rgba(201,169,110,.06);}
.bp.holding{transition:transform 2s ease,filter 2s ease;transform:scale(3.2);filter:blur(2.5px);}
.bp.exhaling{transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s ease,box-shadow 4s ease;
  transform:scale(1);filter:blur(0);
  box-shadow:0 0 28px var(--gold-bright),0 0 80px rgba(240,204,136,.45),0 0 120px rgba(255,232,176,.2);}
.bp.crystallised{transition:transform 1.2s ease,filter 1.2s ease,box-shadow 1.2s ease;
  transform:scale(1.4);filter:blur(0);
  box-shadow:0 0 40px var(--gold-bright),0 0 100px rgba(240,204,136,.6),0 0 180px rgba(255,232,176,.3);
  animation:crystallPulse 2.8s ease-in-out infinite;}
@keyframes crystallPulse{
  0%,100%{box-shadow:0 0 40px var(--gold-bright),0 0 100px rgba(240,204,136,.6),0 0 180px rgba(255,232,176,.3);}
  50%{box-shadow:0 0 60px var(--gold-bright),0 0 140px rgba(240,204,136,.8),0 0 240px rgba(255,232,176,.45);}}
.bripple{position:absolute;width:22px;height:22px;border-radius:50%;
  border:1px solid rgba(201,169,110,.4);pointer-events:none;opacity:0;}
.bripple.expand{animation:ripOut 4s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes ripOut{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(10)}}
.bdots{display:flex;gap:14px;margin-top:56px;}
.bdot{width:7px;height:7px;border-radius:50%;background:rgba(201,169,110,.15);
  transition:background .6s ease,box-shadow .6s ease;}
.bdot.done{background:var(--gold);box-shadow:0 0 8px rgba(201,169,110,.5);}
.obs-note{font-size:var(--fb);color:var(--cream-dim);line-height:1.72;max-width:330px;font-weight:300;}
.closing{font-size:var(--fs);color:rgba(201,169,110,.48);width:100%;max-width:340px;
  font-weight:300;line-height:1.65;text-align:center;opacity:0;}
.return-btn{background:none;border:none;color:rgba(201,169,110,.42);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fs);letter-spacing:.12em;
  cursor:pointer;padding:16px 32px;min-height:52px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease;font-weight:300;}
.return-btn:hover{color:var(--gold);}
#tapNext{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.14em;
  color:rgba(201,169,110,.35);pointer-events:none;z-index:20;
  animation:pulse 2.8s ease-in-out infinite;white-space:nowrap;font-weight:300;
  transition:opacity .7s ease;}

/* ═══ STILL SCREEN ═══ */
#s-still{gap:30px;}
.still-p{width:16px;height:16px;border-radius:50%;background:var(--gold-bright);
  box-shadow:0 0 24px var(--gold),0 0 60px rgba(201,169,110,.26);
  animation:sb 6s ease-in-out infinite;}
@keyframes sb{0%,100%{box-shadow:0 0 24px var(--gold),0 0 60px rgba(201,169,110,.26);}
  50%{box-shadow:0 0 36px var(--gold-bright),0 0 90px rgba(240,204,136,.38);}}
.still-line{font-size:var(--fh);color:var(--cream-dim);text-align:center;
  line-height:1.6;max-width:300px;font-weight:300;}
.still-back{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.38);
  cursor:pointer;padding:16px 32px;min-height:52px;
  -webkit-tap-highlight-color:transparent;transition:color .4s ease;font-weight:300;}
.still-back:hover{color:var(--gold);}

/* ═══ DECOHERE SCREENS ═══ */
#s-decohere{gap:20px;text-align:center;padding-top:clamp(72px,18vw,96px);}
.dec-line{font-size:var(--fh);color:var(--cream-dim);line-height:1.55;
  max-width:300px;font-weight:300;}
.dec-sub{font-size:var(--fs);color:var(--cream-ghost);letter-spacing:.04em;}
.shadow-grid{display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(14px,4vw,24px);width:100%;max-width:min(90vw,400px);padding:0 4px;}
.shadow-orb{display:flex;align-items:center;justify-content:center;
  padding:clamp(10px,3vw,14px) 4px;
  cursor:pointer;background:none;border:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  font-size:clamp(22px,6vw,34px);letter-spacing:.06em;
  font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:400;
  color:rgba(180,165,190,.65);
  text-shadow:0 0 14px rgba(160,140,180,.2);
  transition:color .3s ease,text-shadow .3s ease,opacity .3s ease;
  animation:shadowFloat var(--shadow-dur,5s) ease-in-out infinite;
  opacity:0.72;}
.shadow-orb:active,.shadow-orb:hover{
  color:rgba(220,200,235,.92);opacity:1;

/* ═══ WELCOME INTRO ═══ */
#s-welcome{gap:0;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}

<div class="screen" id="s-dec-end">
  <div class="dec-end-line" id="decEndLine"></div>
  <div class="dec-witnessed" id="decWitnessed"></div>
  <div class="dec-btns">
    <button class="dec-btn" id="decRetBtn" onclick="goHome()"></button>
    <button class="dec-btn" id="decAgainBtn" onclick="startDecohere()"></button>

</div>


<div class="screen" id="s-settings">
  <div class="settings-wrap">
    <div class="settings-title">settings</div>
    <div class="settings-copy">AI reflections remain optional. You can store your own API key locally on this device. Your core practice stays unchanged.</div>
    <input id="apiKeyInput" class="settings-input" type="password" placeholder="enter API key" />
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="settings-btn" onclick="saveApiKey()">save key</button>
      <button class="settings-btn" onclick="clearApiKey()">remove key</button>
    </div>
    <div class="settings-copy" style="font-size:var(--fl);">Stored only on your device.</div>
    <div class="settings-divider"></div>
    <div class="settings-copy">If the field supports your practice, you may support its creation.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="settings-btn" onclick="openDonate()">donate</button>
      <button class="settings-btn" onclick="goHome()">return</button>
    </div>
  </div>
</div>

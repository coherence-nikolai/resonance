<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080610">
<title>Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ── ROOT ── */
:root {
  /* Warm dawn palette — deep indigo-black, rose-gold, violet-cream */
  --bg:       #080610;
  --bg-warm:  #0e0a18;
  --rose:     #c8826e;
  --rose-bright: #e0a090;
  --rose-dim: rgba(200,130,110,.72);
  --violet:   #9880b8;
  --violet-bright: #c8aae0;
  --violet-dim: rgba(152,128,184,.65);
  --cream:    #ede0d4;
  --cream-dim: rgba(237,224,212,.88);
  --cream-ghost: rgba(237,224,212,.55);
  --gold:     #c9a96e;
  --gold-bright: #e8c88a;
  --thread:   #8abfb8; /* AI witnessing frequency — aqua-sage */

  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;

  --fs:  clamp(22px,5.5vw,28px);
  --fl:  clamp(20px,5vw,26px);
  --fh:  clamp(28px,7vw,36px);
  --fxl: clamp(36px,9vw,52px);
  --fwm: clamp(52px,14vw,80px);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: var(--sans);
  font-weight: 300;
  color: var(--cream);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  user-select: none;
  -webkit-user-select: none;
}
a { color: inherit; text-decoration: none; }
b, strong { font-weight: 400; }

/* ── CANVAS ── */
#cv {
  position: fixed; inset: 0;
  z-index: 1; pointer-events: none;
}

/* ── AURORA — warm violet/rose gradients ── */
.aurora {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none; overflow: hidden;
}
.al {
  position: absolute; border-radius: 50%;
  filter: blur(100px); opacity: 0;
  transition: opacity 5s ease;
}
.al.on { opacity: 1; }
.a1 {
  width: 80vw; height: 80vw;
  background: radial-gradient(circle, rgba(152,128,184,.12) 0%, transparent 70%);
  top: -20%; left: -20%;
  animation: da1 28s ease-in-out infinite;
}
.a2 {
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(200,130,110,.10) 0%, transparent 70%);
  bottom: -10%; right: -10%;
  animation: da2 34s ease-in-out infinite;
}
.a3 {
  width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(138,191,184,.08) 0%, transparent 70%);
  top: 30%; right: -5%;
  animation: da3 22s ease-in-out infinite;
}
@keyframes da1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6vw,4vw)} }
@keyframes da2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-4vw,-6vw)} }
@keyframes da3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-3vw,5vw)} 66%{transform:translate(4vw,-3vw)} }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  z-index: 10;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(20px,5vw,40px);
  pointer-events: none;
}
.screen.active {
  display: flex;
  pointer-events: all;
}
@media(min-width:600px) {
  .screen.active {
    left: 50%; transform: translateX(-50%);
    width: min(480px,100vw); right: auto;
  }
  #chrome, #settings-panel {
    left: 50%; transform: translateX(-50%);
    width: min(480px,100vw);
  }
}

/* ── CHROME ── */
#chrome {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; z-index: 300;
}
.chrome-btn {
  font-family: var(--sans);
  font-size: var(--fl);
  letter-spacing: .08em;
  color: var(--rose-dim);
  background: none; border: none;
  cursor: pointer;
  padding: 10px 14px;
  min-height: 44px; min-width: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: color .4s ease;
  font-weight: 300;
}
.chrome-btn:hover { color: var(--rose); }
#backBtn { text-align: left; }
#settingsBtn { font-size: clamp(15px,3.8vw,18px); text-align: right; }

/* ── SETTINGS ── */
#settings-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 500;
  background: rgba(8,6,16,.97);
  border-top: 1px solid rgba(152,128,184,.14);
  border-radius: 20px 20px 0 0;
  padding: 28px 28px 52px;
  transform: translateY(100%);
  transition: transform .45s cubic-bezier(.32,.72,0,1);
  max-height: 88vh; overflow-y: auto;
}
#settings-panel.open { transform: translateY(0); }
.settings-wordmark {
  font-family: var(--serif);
  font-size: clamp(14px,3.5vw,17px);
  letter-spacing: .18em;
  color: var(--rose-dim);
  text-align: center;
  margin-bottom: 28px;
  font-style: italic;
}
.settings-section { margin-bottom: 28px; }
.settings-label {
  font-size: clamp(10px,2.5vw,12px);
  letter-spacing: .18em;
  color: var(--rose-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.settings-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.api-input {
  flex: 1; background: none;
  border: 1px solid rgba(152,128,184,.18);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--sans);
  font-size: var(--fl);
  color: var(--cream-dim);
  min-height: 44px; min-width: 0;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .3s ease;
}
.api-input:focus { border-color: rgba(152,128,184,.6); }
.api-input::placeholder { color: rgba(237,224,212,.35); }
.settings-btn {
  background: none;
  border: 1px solid rgba(152,128,184,.18);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: var(--sans);
  font-size: var(--fl);
  color: var(--rose-dim);
  cursor: pointer;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: all .3s ease;
  white-space: nowrap;
}
.settings-btn:hover { border-color: rgba(200,130,110,.5); color: var(--rose); }
.api-status {
  font-size: clamp(10px,2.4vw,12px);
  letter-spacing: .10em;
  color: var(--rose-dim);
  width: 100%; margin-top: 6px;
}
.api-note {
  font-size: clamp(10px,2.4vw,11px);
  color: var(--cream-ghost);
  margin-top: 4px; line-height: 1.5;
}
.toggle-row { display: flex; gap: 10px; flex-wrap: wrap; }
.toggle-pill {
  background: none;
  border: 1px solid rgba(152,128,184,.18);
  border-radius: 999px;
  padding: 10px 20px;
  font-family: var(--sans);
  font-size: var(--fl);
  letter-spacing: .08em;
  color: rgba(152,128,184,.55);
  cursor: pointer; min-height: 42px;
  -webkit-tap-highlight-color: transparent;
  transition: all .3s ease;
}
.toggle-pill.active {
  border-color: rgba(152,128,184,.7);
  color: var(--violet-bright);
  box-shadow: 0 0 14px rgba(152,128,184,.12);
}
.kofi-line {
  font-size: clamp(11px,2.6vw,13px);
  color: var(--rose-dim);
  text-align: center; margin-top: 4px; line-height: 1.7;
}
.kofi-line a { color: var(--rose); }
#settings-backdrop {
  position: fixed; inset: 0;
  z-index: 490;
  background: rgba(0,0,0,0);
  pointer-events: none;
  transition: background .35s ease;
}
#settings-backdrop.open {
  background: rgba(0,0,0,.5);
  pointer-events: all;
}

/* ── ANIMATIONS ── */
@keyframes fieldBreathe {
  0%,100% { text-shadow: 0 0 24px rgba(200,130,110,.18), 0 0 48px rgba(152,128,184,.08); }
  50%      { text-shadow: 0 0 40px rgba(200,130,110,.45), 0 0 80px rgba(152,128,184,.22), 0 0 130px rgba(200,130,110,.10); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity: .35; }
  50%     { opacity: .85; }
}
@keyframes waveFloat {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%     { transform: translateX(-50%) translateY(-6px); }
}

/* ── HOME SCREEN ── */
#s-home {
  justify-content: center;
  gap: 0;
  padding-top: clamp(60px,14vw,80px);
}

.field-wordmark {
  font-family: var(--serif);
  font-size: clamp(52px,14vw,76px);
  font-weight: 300;
  letter-spacing: .22em;
  color: var(--rose);
  line-height: 1;
  margin-bottom: clamp(48px,12vw,72px);
  animation: fieldBreathe 7s ease-in-out infinite;
  font-style: italic;
}

/* Single entry — the question is the button */
.home-enter-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 20px 28px;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: clamp(48px,12vw,72px);
  max-width: 320px;
}
.home-enter-btn:active { opacity: .7; }

.home-enter-question {
  font-family: var(--serif);
  font-size: clamp(24px,6.5vw,36px);
  font-weight: 300;
  font-style: italic;
  color: var(--cream-dim);
  letter-spacing: .04em;
  line-height: 1.5;
  text-align: center;
  animation: fieldBreathe 9s ease-in-out infinite;
}

.home-enter-sub {
  font-family: var(--sans);
  font-size: clamp(11px,2.8vw,13px);
  letter-spacing: .22em;
  color: rgba(152,128,184,.45);
  text-transform: uppercase;
}

/* Home bottom row */
.home-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}

.home-count {
  font-size: var(--fl);
  color: rgba(200,130,110,.55);
  letter-spacing: .08em;
  text-align: center;
}

.home-lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 3px;
  border: 1px solid rgba(152,128,184,.14);
  border-radius: 999px;
  background: rgba(237,224,212,.02);
}
.lang-seg {
  background: none; border: none;
  color: rgba(237,224,212,.35);
  font-family: var(--sans);
  font-size: clamp(10px,2.5vw,12px);
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .28s ease, color .28s ease;
  min-width: 52px;
}
.lang-seg.active {
  color: var(--violet-bright);
  background: rgba(152,128,184,.14);
}

/* ── ENTER SCREEN — the river begins ── */
#s-enter {
  justify-content: flex-start;
  gap: 0;
  text-align: center;
  padding-top: clamp(70px,16vw,90px);
  padding-bottom: 100px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.enter-title {
  font-family: var(--serif);
  font-size: clamp(13px,3.2vw,16px);
  letter-spacing: .24em;
  color: var(--rose-dim);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.enter-question {
  font-family: var(--serif);
  font-size: clamp(28px,7vw,40px);
  font-weight: 300;
  font-style: italic;
  color: var(--cream-dim);
  line-height: 1.5;
  max-width: 300px;
  margin-bottom: 28px;
}

.enter-input-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%;
  max-width: 340px;
}

.enter-input {
  background: none;
  border: none;
  border-bottom: 1px solid rgba(152,128,184,.25);
  outline: none;
  font-family: var(--serif);
  font-size: clamp(18px,4.8vw,24px);
  font-style: italic;
  letter-spacing: .04em;
  color: var(--cream-dim);
  width: 100%;
  padding: 12px 0;
  text-align: center;
  caret-color: var(--rose);
  transition: border-color .4s ease;
}
.enter-input:focus { border-bottom-color: rgba(200,130,110,.55); }
.enter-input::placeholder { color: rgba(237,224,212,.22); }

.enter-or {
  font-size: var(--fl);
  color: rgba(237,224,212,.28);
  letter-spacing: .18em;
}

/* Contraction grid — scrollable field of states */
.contraction-scroll {
  width: 100%;
  max-width: 340px;
}

/* Contraction grid — what people carry in */
.contraction-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  width: 100%;
  padding-bottom: 8px;
}
.contraction-pill {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-style: italic;
  color: rgba(200,130,110,.75);
  background: rgba(200,130,110,.06);
  border: 1px solid rgba(200,130,110,.22);
  border-radius: 999px;
  padding: 12px 24px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all .25s ease;
  animation: shadowAgitate var(--drift-dur, 3s) ease-in-out infinite;
}
.contraction-pill:hover, .contraction-pill:active {
  background: rgba(200,130,110,.14);
  border-color: rgba(200,130,110,.6);
  color: var(--rose-bright);
}
@keyframes shadowAgitate {
  0%,100% { transform: translate(0,0); }
  20%  { transform: translate(-0.5px, 0.5px); }
  50%  { transform: translate(0.5px,-0.5px); }
  80%  { transform: translate(-0.3px, 0.3px); }
}

.something-else-btn {
  font-family: var(--serif);
  font-size: clamp(16px,4vw,20px);
  font-style: italic;
  color: rgba(237,224,212,.32);
  background: none; border: none;
  cursor: pointer;
  padding: 16px 24px;
  -webkit-tap-highlight-color: transparent;
  transition: color .3s ease;
  letter-spacing: .04em;
  margin-top: 8px;
}
.something-else-btn:hover { color: rgba(237,224,212,.55); }

/* Freq screen */
#s-freq {
  justify-content: center;
  gap: clamp(18px,4.5vw,28px);
  padding: clamp(70px,16vw,90px) 16px 110px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.enter-continue {
  position: fixed;
  bottom: 32px;
  left: 50%; transform: translateX(-50%);
  font-family: var(--sans);
  font-size: var(--fl);
  letter-spacing: .14em;
  color: var(--rose-dim);
  background: rgba(8,6,16,.92);
  border: 1px solid rgba(200,130,110,.2);
  border-radius: 999px;
  cursor: pointer;
  padding: 14px 36px; min-height: 52px;
  -webkit-tap-highlight-color: transparent;
  transition: color .4s ease, border-color .4s ease, opacity .4s ease;
  opacity: 0; pointer-events: none;
  animation: pulse 2.8s ease-in-out infinite;
  z-index: 50;
  white-space: nowrap;
}
.enter-continue.ready { opacity: 1; pointer-events: all; }

/* ── PHASE SCREENS — Notice, Hold, Anchor, Integrate ── */
.phase-screen {
  justify-content: center;
  gap: clamp(20px,5vw,32px);
  text-align: center;
  padding-top: clamp(60px,14vw,80px);
}

.phase-indicator {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
}
.phase-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(152,128,184,.18);
  transition: background .6s ease, transform .4s ease;
}
.phase-dot.active {
  background: var(--rose);
  transform: scale(1.3);
}
.phase-dot.done {
  background: rgba(200,130,110,.45);
}

.phase-name {
  font-family: var(--sans);
  font-size: clamp(13px,3.2vw,16px);
  letter-spacing: .22em;
  color: var(--rose-dim);
  text-transform: uppercase;
}

.phase-carrying {
  font-family: var(--serif);
  font-size: clamp(36px,10vw,56px);
  font-weight: 300;
  font-style: italic;
  color: var(--rose-bright);
  letter-spacing: .04em;
  line-height: 1.2;
  max-width: 90vw;
  word-break: break-word;
  animation: fieldBreathe 5s ease-in-out infinite;
}

.phase-prompt {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-style: italic;
  color: var(--cream-dim);
  line-height: 1.7;
  max-width: 88vw;
  padding: 0 16px;
}

/* Body location selector */
.body-prompt {
  font-size: var(--fl);
  color: var(--cream-ghost);
  letter-spacing: .10em;
  margin-bottom: 4px;
}
.body-zones {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  max-width: 90vw;
}
.body-zone {
  font-family: var(--sans);
  font-size: clamp(16px,4vw,20px);
  letter-spacing: .08em;
  color: rgba(152,128,184,.72);
  background: none;
  border: 1px solid rgba(152,128,184,.22);
  border-radius: 999px;
  padding: 12px 22px; min-height: 48px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all .25s ease;
}
.body-zone.active {
  border-color: rgba(152,128,184,.65);
  color: var(--violet-bright);
  background: rgba(152,128,184,.08);
}

/* AI thread — witnessing presence */
.ai-thread {
  font-family: var(--serif);
  font-size: clamp(20px,5vw,26px);
  font-style: italic;
  color: var(--thread);
  letter-spacing: .03em;
  line-height: 1.7;
  max-width: 88vw;
  padding: 0 16px;
  text-align: center;
  opacity: 0;
  transition: opacity 2s ease;
  min-height: 28px;
}
.ai-thread.visible { opacity: 1; }

/* Phase nav */
.phase-nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.phase-forward {
  font-family: var(--sans);
  font-size: var(--fl);
  letter-spacing: .14em;
  color: var(--rose-dim);
  background: none; border: none;
  cursor: pointer;
  padding: 14px 28px; min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  transition: color .4s ease;
  animation: pulse 2.8s ease-in-out infinite;
}
.phase-forward:hover { color: var(--rose); }
.phase-forward.pinned {
  position: fixed;
  bottom: 32px;
  left: 50%; transform: translateX(-50%);
  background: rgba(8,6,16,.92);
  border: 1px solid rgba(200,130,110,.2);
  border-radius: 999px;
  padding: 14px 36px;
  opacity: 0;
  pointer-events: none;
  z-index: 50;
  white-space: nowrap;
}
.phase-forward.pinned.ready {
  opacity: 1;
  pointer-events: all;
}
.phase-skip {
  font-size: clamp(16px,4vw,20px);
  letter-spacing: .14em;
  color: var(--cream-ghost);
  background: none; border: none;
  cursor: pointer;
  padding: 12px 20px; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: color .3s ease;
}

/* ── ANCHOR PHASE — the polarity reveal ── */
#s-anchor {
  justify-content: center;
  gap: clamp(16px,4vw,24px);
  padding-top: clamp(60px,14vw,80px);
}

.polarity-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(14px,3.5vw,22px);
  width: 100%;
  max-width: 320px;
}

.polarity-heavy {
  font-family: var(--serif);
  font-size: clamp(24px,6vw,32px);
  font-style: italic;
  color: rgba(200,130,110,.75);
  text-align: center;
  line-height: 1.5;
  max-width: 88vw;
  padding: 0 12px;
  opacity: 0;
  transition: opacity 1.4s ease;
}
.polarity-heavy.visible { opacity: 1; }

.polarity-and {
  font-family: var(--sans);
  font-size: clamp(14px,3.5vw,18px);
  letter-spacing: .28em;
  color: var(--cream-ghost);
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.polarity-and.visible { opacity: 1; }

.polarity-light {
  font-family: var(--serif);
  font-size: clamp(24px,6vw,32px);
  font-style: italic;
  color: var(--violet-bright);
  text-align: center;
  line-height: 1.5;
  max-width: 88vw;
  padding: 0 12px;
  opacity: 0;
  transition: opacity 2s ease;
}
.polarity-light.visible { opacity: 1; }

.polarity-both {
  font-family: var(--sans);
  font-size: clamp(16px,4vw,20px);
  letter-spacing: .06em;
  color: var(--cream-ghost);
  text-align: center;
  line-height: 1.7;
  max-width: 88vw;
  padding: 0 16px;
  opacity: 0;
  transition: opacity 1.6s ease;
}
.polarity-both.visible { opacity: 1; }

/* Frequency selection */
.freq-label {
  font-size: clamp(14px,3.5vw,17px);
  letter-spacing: .18em;
  color: var(--rose-dim);
  text-transform: uppercase;
}
.freq-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 88vw;
}
.freq-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 18px 10px;
  background: rgba(237,224,212,.02);
  border: 1px solid rgba(152,128,184,.12);
  border-radius: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all .25s ease;
}
.freq-btn:hover, .freq-btn.chosen {
  background: rgba(152,128,184,.08);
  border-color: rgba(152,128,184,.45);
}
.freq-name {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-style: italic;
  color: var(--violet-bright);
}
.freq-hint {
  font-size: clamp(13px,3.2vw,16px);
  letter-spacing: .04em;
  color: var(--cream-ghost);
  text-align: center;
  line-height: 1.4;
}

/* ── BREATH PHASE — inside anchor ── */
#s-breath {
  justify-content: center;
  gap: 0;
  overflow: hidden;
}

.breath-word {
  position: fixed;
  top: calc(50% - clamp(110px,24vw,150px));
  left: 50%; transform: translateX(-50%);
  font-family: var(--sans);
  font-size: clamp(18px,4.5vw,22px);
  letter-spacing: .22em;
  color: var(--cream-dim);
  text-align: center;
  text-transform: lowercase;
  opacity: 0;
  transition: opacity .6s ease;
  z-index: 22; pointer-events: none;
  white-space: nowrap;
}

.breath-dots {
  position: fixed;
  bottom: clamp(55px,12vw,80px);
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px;
  z-index: 20; pointer-events: none;
}
.bdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(152,128,184,.18);
  transition: background .6s ease, box-shadow .6s ease;
}
.bdot.done {
  background: var(--rose);
  box-shadow: 0 0 8px rgba(200,130,110,.7);
}

/* ── INTEGRATE SCREEN ── */
#s-integrate {
  justify-content: center;
  gap: clamp(24px,6vw,40px);
  text-align: center;
}

.integrate-witnessed {
  font-family: var(--serif);
  font-size: clamp(24px,6vw,32px);
  font-style: italic;
  color: var(--cream-dim);
  line-height: 1.6;
  max-width: 88vw;
  padding: 0 16px;
  opacity: 0;
  transition: opacity 2.5s ease;
}
.integrate-witnessed.visible { opacity: 1; }

.integrate-thread-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%; max-width: 88vw;
  padding: 0 16px;
  opacity: 0;
  transition: opacity 1.8s ease;
  pointer-events: none;
}
.integrate-thread-wrap.visible {
  opacity: 1; pointer-events: all;
}

.integrate-prompt {
  font-size: clamp(16px,4vw,20px);
  letter-spacing: .14em;
  color: var(--cream-ghost);
  text-transform: lowercase;
}

.integrate-input {
  background: none; border: none;
  border-bottom: 1px solid rgba(152,128,184,.22);
  outline: none;
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-style: italic;
  color: var(--cream-dim);
  width: 100%;
  padding: 12px 0;
  text-align: center;
  caret-color: var(--rose);
  transition: border-color .4s ease;
}
.integrate-input:focus { border-bottom-color: rgba(200,130,110,.5); }
.integrate-input::placeholder { color: rgba(237,224,212,.22); }

.integrate-ai-response {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-style: italic;
  color: var(--thread);
  text-align: center;
  line-height: 1.7;
  max-width: 88vw;
  padding: 0 16px;
  opacity: 0;
  transition: opacity 2.2s ease;
  min-height: 24px;
}
.integrate-ai-response.visible { opacity: 1; }

.integrate-return {
  font-family: var(--sans);
  font-size: var(--fl);
  letter-spacing: .14em;
  color: rgba(200,130,110,.55);
  background: none; border: none;
  cursor: pointer;
  padding: clamp(14px,4vh,22px) 28px;
  min-height: 52px;
  -webkit-tap-highlight-color: transparent;
  transition: color .4s ease, opacity .6s ease;
  opacity: 0;
}
.integrate-return.visible { opacity: 1; }
.integrate-return:hover { color: var(--rose); }

/* Whisper — past session echo */
.integrate-whisper {
  font-family: var(--serif);
  font-size: clamp(13px,3.2vw,16px);
  font-style: italic;
  color: rgba(152,128,184,.55);
  text-align: center;
  max-width: 260px;
  line-height: 1.7;
  opacity: 0;
  transition: opacity 1.8s ease;
}
.integrate-whisper.visible { opacity: 1; }

/* ── BURST ── */
.burst-el {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 0; height: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,130,110,.5) 0%, rgba(152,128,184,.18) 35%, transparent 70%);
  pointer-events: none; z-index: 200; opacity: 0;
}
.burst-el.go { animation: burst 1.1s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes burst {
  0%   { width:0; height:0; opacity:.75; margin:0; }
  100% { width:200vmax; height:200vmax; margin:-100vmax; opacity:0; }
}

/* ── SMALL HEIGHT ADJUSTMENT ── */
@media(max-height:720px) {
  #s-home { padding-top: 52px; }
  .field-arrival { margin-bottom: 20px; }
  .phases { gap: 8px; }
  .phase-btn { padding: 14px 10px; }
}

/* ── FONT LARGE ── */
body.fs-large .phase-label   { font-size: clamp(13px,3.2vw,15px); }
body.fs-large .phase-hint    { font-size: clamp(13px,3.2vw,15px); }
body.fs-large .phase-prompt  { font-size: clamp(18px,4.8vw,26px); }
body.fs-large .enter-question { font-size: clamp(26px,7vw,40px); }
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div class="aurora">
  <div class="al a1"></div>
  <div class="al a2"></div>
  <div class="al a3"></div>
</div>
<div class="burst-el" id="burst"></div>

<div id="settings-backdrop" onclick="closeSettings()"></div>

<div id="settings-panel">
  <div class="settings-wordmark">Field · Settings</div>
  <div class="settings-section">
    <div class="settings-label">Anthropic API Key</div>
    <div class="settings-row">
      <input class="api-input" id="st-api-input" type="password"
        placeholder="sk-ant-..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="settings-btn" onclick="saveApiKey()">save</button>
      <button class="settings-btn" onclick="clearApiKey()">clear</button>
    </div>
    <div class="api-status" id="st-api-status">no key</div>
    <div class="api-note" id="st-api-note"></div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Audio</div>
    <div class="toggle-row">
      <button class="toggle-pill active" id="st-audio" onclick="settingsToggleAudio()">sound on</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Text Size</div>
    <div class="toggle-row">
      <button class="toggle-pill" id="st-font" onclick="settingsToggleFont()">larger text</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Language</div>
    <div class="toggle-row">
      <button class="toggle-pill" id="st-lang" onclick="settingsToggleLang()">EN</button>
    </div>
  </div>
  <div class="kofi-line">
    if this has been useful ·
    <a href="https://buymeacoffee.com/coherence_nikolai" target="_blank" rel="noopener">buymeacoffee.com/coherence_nikolai</a>
  </div>
</div>

<div id="chrome">
  <button class="chrome-btn" id="backBtn" onclick="goHome()"
    style="opacity:0;pointer-events:none;">←</button>
  <button class="chrome-btn" id="settingsBtn" onclick="toggleSettings()">⚙</button>
</div>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="field-wordmark">Field</div>

  <button class="home-enter-btn" id="homeEnterBtn" onclick="startNotice()">
    <span class="home-enter-question" id="homeArrival"></span>
  </button>

  <div class="home-bottom">
    <div class="home-count" id="homeCount"></div>
    <div class="home-lang-toggle">
      <button class="lang-seg" id="langEn" onclick="setLang('en')">EN</button>
      <button class="lang-seg" id="langEs" onclick="setLang('es')">ES</button>
    </div>
  </div>
</div>

<!-- ENTER — what are you holding? -->
<div class="screen" id="s-enter">
  <div class="enter-question" id="enterQuestion"></div>

  <div class="enter-input-wrap">
    <div class="contraction-scroll">
      <div class="contraction-grid" id="contractionGrid"></div>
      <button class="something-else-btn" id="somethingElseBtn" onclick="toggleSomethingElse()"></button>
      <input class="enter-input" id="enterInput" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" style="display:none;" />
    </div>
  </div>

  <button class="enter-continue" id="enterContinue" onclick="confirmEntry()"></button>
</div>

<!-- NOTICE PHASE -->
<div class="screen phase-screen" id="s-notice">
  <div class="phase-indicator" id="pi-notice">
    <div class="phase-dot active" id="pd0"></div>
    <div class="phase-dot" id="pd1"></div>
    <div class="phase-dot" id="pd2"></div>
    <div class="phase-dot" id="pd3"></div>
  </div>
  <div class="phase-name" id="pname-notice"></div>
  <div class="phase-carrying" id="carrying-notice"></div>
  <div class="phase-prompt" id="prompt-notice"></div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:300px;">
    <div class="body-prompt" id="bodyPrompt"></div>
    <div class="body-zones" id="bodyZones"></div>
  </div>

  <div class="ai-thread" id="aiNotice"></div>

  <div class="phase-nav">
    <button class="phase-forward" id="fwdNotice" onclick="advanceToHold()"></button>
    <button class="phase-skip" id="skipNotice" onclick="advanceToHold()"></button>
  </div>
</div>

<!-- HOLD PHASE -->
<div class="screen phase-screen" id="s-hold">
  <div class="phase-indicator">
    <div class="phase-dot done"></div>
    <div class="phase-dot active"></div>
    <div class="phase-dot"></div>
    <div class="phase-dot"></div>
  </div>
  <div class="phase-name" id="pname-hold"></div>
  <div class="phase-carrying" id="carrying-hold"></div>
  <div class="phase-prompt" id="prompt-hold"></div>
  <div class="ai-thread" id="aiHold"></div>
  <div class="phase-nav">
    <button class="phase-forward" id="fwdHold" onclick="advanceToAnchor()"></button>
    <button class="phase-skip" id="skipHold" onclick="advanceToAnchor()"></button>
  </div>
</div>

<!-- ANCHOR SCREEN 1 — polarity reveal -->
<div class="screen" id="s-anchor">
  <div class="phase-indicator">
    <div class="phase-dot done"></div>
    <div class="phase-dot done"></div>
    <div class="phase-dot active"></div>
    <div class="phase-dot"></div>
  </div>
  <div class="phase-name" id="pname-anchor"></div>

  <div class="polarity-wrap">
    <div class="polarity-heavy" id="polarityHeavy"></div>
    <div class="polarity-and" id="polarityAnd">and</div>
    <div class="polarity-light" id="polarityLight"></div>
  </div>

  <div class="phase-nav">
    <button class="phase-forward" id="fwdAnchor1" style="opacity:0;pointer-events:none;" onclick="advanceToFreq()"></button>
  </div>
</div>

<!-- ANCHOR SCREEN 2 — frequency selection -->
<div class="screen" id="s-freq">
  <div class="phase-indicator">
    <div class="phase-dot done"></div>
    <div class="phase-dot done"></div>
    <div class="phase-dot active"></div>
    <div class="phase-dot"></div>
  </div>
  <div class="freq-label" id="freqLabel"></div>
  <div class="freq-grid" id="freqGrid"></div>
  <button class="phase-forward pinned" id="fwdAnchor" onclick="startBreath()"></button>
</div>

<!-- BREATH — inside anchor -->
<div class="screen" id="s-breath">
  <div class="breath-word" id="breathWord"></div>
  <div class="breath-dots">
    <div class="bdot" id="bdot0"></div>
    <div class="bdot" id="bdot1"></div>
    <div class="bdot" id="bdot2"></div>
  </div>
</div>

<!-- INTEGRATE PHASE -->
<div class="screen" id="s-integrate">
  <div class="phase-indicator">
    <div class="phase-dot done"></div>
    <div class="phase-dot done"></div>
    <div class="phase-dot done"></div>
    <div class="phase-dot active"></div>
  </div>
  <div class="phase-name" id="pname-integrate"></div>

  <div class="integrate-witnessed" id="integrateWitnessed"></div>
  <div class="integrate-whisper" id="integrateWhisper"></div>

  <div class="integrate-thread-wrap" id="integrateThreadWrap">
    <div class="integrate-prompt" id="integratePromptLbl"></div>
    <input class="integrate-input" id="integrateInput" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <div class="integrate-ai-response" id="integrateAI"></div>
  </div>

  <button class="integrate-return" id="integrateReturn" onclick="goHome()"></button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
